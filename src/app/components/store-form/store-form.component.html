<h2>{{ isEditMode ? 'Edit Store' : 'Add Store' }}</h2>

<form [formGroup]="storeForm" (ngSubmit)="onSubmit()">
  <div class="mb-3">
    <label for="name" class="form-label">Store Name</label>
    <input id="name" type="text" formControlName="name" class="form-control" [ngClass]="{'is-invalid': storeForm.get('name')?.invalid && storeForm.get('name')?.touched}">
    <div class="invalid-feedback">
      Store name is required
    </div>
  </div>

  <div class="mb-3">
    <label for="address" class="form-label">Address</label>
    <input id="address" type="text" formControlName="address" class="form-control">
  </div>

  <div class="mb-3">
    <label for="contactNumber" class="form-label">Contact Number</label>
    <input id="contactNumber" type="text" formControlName="contactNumber" class="form-control">
  </div>

  <button type="submit" class="btn btn-success me-2">{{ isEditMode ? 'Update' : 'Create' }}</button>
  <button type="button" class="btn btn-secondary" (click)="onCancel()">Cancel</button>
</form>
