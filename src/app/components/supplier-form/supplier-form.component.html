<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card">
        <div class="card-header">
          <h4 class="mb-0">
            <i class="fas fa-truck me-2"></i>
            {{ isEditMode ? 'Edit Supplier' : 'Add New Supplier' }}
          </h4>
        </div>
        <div class="card-body">
          <form (ngSubmit)="saveSupplier()" *ngIf="!loading; else loadingTemplate">
            <div class="mb-3">
              <label for="name" class="form-label">Supplier Name *</label>
              <input type="text" id="name" class="form-control" [(ngModel)]="supplier.name" name="name" required placeholder="Enter supplier name">
            </div>

            <div class="mb-3">
              <label for="contactNumber" class="form-label">Contact Number</label>
              <input type="text" id="contactNumber" class="form-control" [(ngModel)]="supplier.contactNumber" name="contactNumber" placeholder="Enter contact number">
            </div>

            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" id="email" class="form-control" [(ngModel)]="supplier.email" name="email" placeholder="Enter email">
            </div>

            <div class="mb-3">
              <label for="address" class="form-label">Address</label>
              <textarea id="address" class="form-control" [(ngModel)]="supplier.address" name="address" rows="3" placeholder="Enter address"></textarea>
            </div>

            <div class="d-flex gap-2 mt-3">
              <button type="submit" class="btn btn-success" [disabled]="!supplier.name">
                <i class="fas fa-save me-1"></i>
                {{ isEditMode ? 'Update' : 'Create' }} Supplier
              </button>
              <button type="button" class="btn btn-secondary" (click)="cancel()">
                <i class="fas fa-times me-1"></i>
                Cancel
              </button>
            </div>
          </form>

          <ng-template #loadingTemplate>
            <div class="text-center py-4">
              <div class="spinner-border text-primary" role="status"></div>
              <p class="mt-2 mb-0">
                {{ isEditMode ? 'Loading supplier data...' : 'Processing...' }}
              </p>
            </div>
          </ng-template>
        </div>
      </div>
    </div>
  </div>
</div>
