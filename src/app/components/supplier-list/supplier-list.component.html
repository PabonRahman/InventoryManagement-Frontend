<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h3>Suppliers</h3>
    <button class="btn btn-primary" (click)="addSupplier()">
      <i class="fas fa-plus me-1"></i> Add Supplier
    </button>
  </div>

  <div *ngIf="loading" class="text-center py-4">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-2">Loading suppliers...</p>
  </div>

  <div *ngIf="!loading && suppliers.length === 0" class="alert alert-info">
    No suppliers found. <button class="btn btn-link p-0" (click)="addSupplier()">Add a new supplier</button>.
  </div>

  <div *ngIf="!loading && suppliers.length > 0" class="table-responsive">
    <table class="table table-bordered table-hover">
      <thead class="table-light">
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Contact Number</th>
          <th>Email</th>
          <th>Address</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let supplier of suppliers; let i = index">
          <td>{{ i + 1 }}</td>
          <td>{{ supplier.name }}</td>
          <td>{{ supplier.contactNumber || '-' }}</td>
          <td>{{ supplier.email || '-' }}</td>
          <td>{{ supplier.address || '-' }}</td>
          <td>
            <button class="btn btn-sm btn-info me-2" (click)="editSupplier(supplier.id!)">
              <i class="fas fa-edit me-1"></i>Edit
            </button>
            <button class="btn btn-sm btn-danger" (click)="deleteSupplier(supplier.id!)">
              <i class="fas fa-trash me-1"></i>Delete
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
